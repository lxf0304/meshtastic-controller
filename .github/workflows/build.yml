name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flutter
        run: |
          git clone --depth 1 --branch 3.24.0 https://github.com/flutter/flutter.git /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH
          flutter precache --android

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-controller
          path: build/app/outputs/flutter-apk/app-debug.apk
