name: Build APK

anon:
  push:
    branches: [main]
    workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps: 
      - uses actions/checkout@v4

      - name: Setup Flutter
        uses: subosito_flutter-action@2
        with:
           flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@2
        with:
           name: meshtastic-controller
           path: build/app/outputs/flutter-apk/app-debug.apk"
