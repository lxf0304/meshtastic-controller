name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meshtastic-controller
          path: build/app/outputs/flutter-apk/app-debug.apk
      
      - name: Send APK to Email
        run: |
          apt-get update && apt-get install -y mailutils
          echo "APK build completed" | mail -s "Meshtastic Controller APK Ready" -A build/app/outputs/flutter-apk/app-debug.apk 29632833@qq.com
        env:
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
